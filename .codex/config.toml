[mcp_servers.dokploy-mcp]
command = "npx"
args = ["-y", "@dokploy/mcp"]
env_vars = ["DOKPLOY_URL", "DOKPLOY_API_KEY"]
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.hostinger-api]
command = "npx"
args = ["-y", "hostinger-api-mcp"]
env_vars = ["HOSTINGER_API_TOKEN"]
startup_timeout_sec = 30
tool_timeout_sec = 120
